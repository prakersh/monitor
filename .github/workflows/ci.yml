name: Monitor CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

  
    - name: Build Project
      run: |
        sudo ./build.sh --redis-host localhost --redis-pass "" --target all

    - name: Start Agent
      run: |
        ./agent &
        sleep 5

    - name: Run Tests
      run: |
        # Basic connectivity test
        ./master 1
        # File transfer test
        echo "test" > test.txt
        host=$(./master 1 | grep Hostname | awk {'print $3'})
        ./master 4 $host test.txt /tmp/test.txt
        # Command execution test
        ./master 2 $host "ls -l /tmp/test.txt"

    - name: Stop Agent
      run: |
        ./agent -k 